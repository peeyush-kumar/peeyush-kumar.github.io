<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<style>
  :root {
    --p: #1a1a1a;
    --s: #6b6b6b;
    --t: #999;
    --bg2: #f5f5f5;
    --b: #ddd;
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --p: #e8e8e8;
      --s: #a0a0a0;
      --t: #777;
      --bg2: #2a2a2a;
      --b: #444;
    }
  }
  .th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; }
  .ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; }
  .arr { stroke-width: 1.5; }
  .leader { stroke-dasharray: 3 3; stroke-width: 0.5; }

  /* Teal ramp */
  .c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }

  /* Purple ramp */
  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }

  /* Coral ramp */
  .c-coral > rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }

  /* Amber ramp */
  .c-amber > rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }

  /* Gray ramp */
  .c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #444441; }
  .c-gray .ts { fill: #5F5E5A; }

  /* Red ramp */
  .c-red > rect { fill: #FCEBEB; stroke: #A32D2D; }
  .c-red .th { fill: #791F1F; }
  .c-red .ts { fill: #A32D2D; }

  @media (prefers-color-scheme: dark) {
    .c-teal > rect { fill: #085041; stroke: #5DCAA5; }
    .c-teal .th { fill: #9FE1CB; }
    .c-teal .ts { fill: #5DCAA5; }
    .c-purple > rect { fill: #3C3489; stroke: #AFA9EC; }
    .c-purple .th { fill: #CECBF6; }
    .c-purple .ts { fill: #AFA9EC; }
    .c-coral > rect { fill: #712B13; stroke: #F0997B; }
    .c-coral .th { fill: #F5C4B3; }
    .c-coral .ts { fill: #F0997B; }
    .c-amber > rect { fill: #633806; stroke: #FAC775; }
    .c-amber .th { fill: #FAEEDA; }
    .c-amber .ts { fill: #FAC775; }
    .c-gray > rect { fill: #444441; stroke: #B4B2A9; }
    .c-gray .th { fill: #D3D1C7; }
    .c-gray .ts { fill: #B4B2A9; }
    .c-red > rect { fill: #791F1F; stroke: #F09595; }
    .c-red .th { fill: #F7C1C1; }
    .c-red .ts { fill: #F09595; }
  }
</style>

<!-- Cultural documents (left source) -->
<g class="c-teal">
  <rect x="40" y="60" width="150" height="120" rx="12" stroke-width="0.5"/>
  <text class="th" x="115" y="96" text-anchor="middle">Cultural</text>
  <text class="th" x="115" y="114" text-anchor="middle">documents</text>
  <text class="ts" x="115" y="138" text-anchor="middle">~40 sources</text>
  <text class="ts" x="115" y="154" text-anchor="middle">expert curated</text>
</g>

<!-- Document icons stacked -->
<rect x="56" y="70" width="28" height="34" rx="3" fill="none" stroke="var(--t)" stroke-width="0.5" opacity="0.3"/>
<rect x="62" y="66" width="28" height="34" rx="3" fill="none" stroke="var(--t)" stroke-width="0.5" opacity="0.5"/>

<!-- Arrow: docs to ontology -->
<line x1="190" y1="120" x2="232" y2="120" stroke="var(--s)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Ontology (center piece - the graph) -->
<g class="c-purple">
  <rect x="236" y="40" width="210" height="160" rx="14" stroke-width="0.5"/>
  <text class="th" x="341" y="68" text-anchor="middle">Learned ontology</text>
  <text class="ts" x="341" y="86" text-anchor="middle">JSON-LD graph</text>
</g>

<!-- Mini knowledge graph inside ontology box -->
<circle cx="280" cy="130" r="8" fill="#7F77DD" opacity="0.7"/>
<circle cx="340" cy="110" r="10" fill="#7F77DD" opacity="0.85"/>
<circle cx="400" cy="130" r="8" fill="#7F77DD" opacity="0.7"/>
<circle cx="310" cy="160" r="7" fill="#7F77DD" opacity="0.6"/>
<circle cx="370" cy="165" r="7" fill="#7F77DD" opacity="0.6"/>
<line x1="280" y1="130" x2="340" y2="110" stroke="#AFA9EC" stroke-width="1"/>
<line x1="340" y1="110" x2="400" y2="130" stroke="#AFA9EC" stroke-width="1"/>
<line x1="280" y1="130" x2="310" y2="160" stroke="#AFA9EC" stroke-width="1"/>
<line x1="340" y1="110" x2="370" y2="165" stroke="#AFA9EC" stroke-width="1"/>
<line x1="400" y1="130" x2="370" y2="165" stroke="#AFA9EC" stroke-width="1"/>
<line x1="310" y1="160" x2="370" y2="165" stroke="#AFA9EC" stroke-width="1"/>

<!-- Arrow: ontology to evaluation -->
<line x1="341" y1="200" x2="341" y2="248" stroke="var(--s)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- LLM block (right) -->
<g class="c-coral">
  <rect x="490" y="60" width="150" height="120" rx="12" stroke-width="0.5"/>
  <text class="th" x="565" y="96" text-anchor="middle">LLM output</text>
  <text class="ts" x="565" y="118" text-anchor="middle">Long-form text</text>
  <text class="ts" x="565" y="136" text-anchor="middle">on cultural topics</text>
</g>

<!-- Arrow: LLM to triples extraction -->
<line x1="565" y1="180" x2="565" y2="248" stroke="var(--s)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Triple extraction zone -->
<g class="c-gray">
  <rect x="456" y="252" width="184" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="548" y="276" text-anchor="middle">Extract triples</text>
  <text class="ts" x="548" y="294" text-anchor="middle">(S', P', O')</text>
</g>

<!-- Ontology triples -->
<g class="c-gray">
  <rect x="200" y="252" width="184" height="60" rx="8" stroke-width="0.5"/>
  <text class="th" x="292" y="276" text-anchor="middle">Ontology triples</text>
  <text class="ts" x="292" y="294" text-anchor="middle">(S, P, O)</text>
</g>

<!-- Arrows into evaluation -->
<line x1="292" y1="312" x2="292" y2="356" stroke="var(--s)" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="548" y1="312" x2="548" y2="356" stroke="var(--s)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Central evaluation block -->
<g class="c-amber">
  <rect x="140" y="360" width="400" height="120" rx="14" stroke-width="0.5"/>
  <text class="th" x="340" y="392" text-anchor="middle">Evaluation framework</text>
</g>

<!-- Metric pills inside eval block -->
<rect x="160" y="408" width="110" height="28" rx="14" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="215" y="426" text-anchor="middle" font-family="var(--font-sans)" font-size="11" font-weight="500" fill="#633806" dominant-baseline="central">Triple matching</text>

<rect x="282" y="408" width="114" height="28" rx="14" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="339" y="426" text-anchor="middle" font-family="var(--font-sans)" font-size="11" font-weight="500" fill="#633806" dominant-baseline="central">Graph edit dist.</text>

<rect x="408" y="408" width="118" height="28" rx="14" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="467" y="426" text-anchor="middle" font-family="var(--font-sans)" font-size="11" font-weight="500" fill="#633806" dominant-baseline="central">ROUGE-L recall</text>

<rect x="210" y="444" width="110" height="28" rx="14" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="265" y="462" text-anchor="middle" font-family="var(--font-sans)" font-size="11" font-weight="500" fill="#633806" dominant-baseline="central">Bias classifier</text>

<!-- Bias type labels -->
<g class="c-red">
  <rect x="40" y="400" width="88" height="80" rx="8" stroke-width="0.5"/>
  <text class="ts" x="84" y="428" text-anchor="middle">Misrepre-</text>
  <text class="ts" x="84" y="442" text-anchor="middle">sentation</text>
  <text class="ts" x="84" y="462" text-anchor="middle">Absence</text>
  <text class="ts" x="84" y="478" text-anchor="middle">Value mis-</text>
</g>

<!-- Arrow from eval to bias types -->
<line x1="140" y1="440" x2="128" y2="440" stroke="var(--s)" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Probe arrow from ontology to LLM -->
<path d="M446 80 L490 80" fill="none" stroke="var(--s)" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="468" y="72" text-anchor="middle" fill="var(--s)">Probe</text>

<!-- Title -->
<text x="340" y="24" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="var(--p)">Culturally grounded evaluation of LLM long-form outputs</text>

</svg>